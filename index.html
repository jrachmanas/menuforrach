<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Šeimos Meniu</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #faf7f2;
      --card: #ffffff;
      --ink: #1a1612;
      --muted: #8a8278;
      --accent: #c8773a;
      --accent-light: #f5e8d8;
      --green: #4a7c59;
      --green-light: #e4ede7;
      --border: #e8e2d9;
      --shadow: 0 2px 12px rgba(26,22,18,0.07);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    header {
      background: var(--ink);
      color: #fff;
      padding: 28px 24px 22px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      letter-spacing: -0.01em;
      flex: 1;
    }
    #today-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .week-strip {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .week-strip::-webkit-scrollbar { display: none; }

    .day-chip {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 16px;
      border-radius: 50px;
      cursor: pointer;
      border: 2px solid transparent;
      background: transparent;
      transition: all .18s ease;
      font-family: 'DM Sans', sans-serif;
    }
    .day-chip .abbr {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .day-chip .num {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--ink);
    }
    .day-chip:hover { background: var(--accent-light); }
    .day-chip.active { background: var(--ink); border-color: var(--ink); }
    .day-chip.active .abbr,
    .day-chip.active .num { color: #fff; }
    .day-chip.is-today { border-color: var(--accent); }
    .day-chip.is-today .abbr { color: var(--accent); font-weight: 700; }
    .day-chip.active.is-today { background: var(--accent); border-color: var(--accent); }
    .day-chip.active.is-today .abbr,
    .day-chip.active.is-today .num { color: #fff; }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .day-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 18px;
      padding-left: 2px;
    }

    .group-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .meal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow .2s;
    }
    .meal-card:hover { box-shadow: 0 4px 20px rgba(26,22,18,0.1); }

    .meal-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .meal-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .meal-time { flex: 1; min-width: 0; }
    .meal-time strong { display: block; font-size: 0.88rem; font-weight: 600; }
    .meal-preview {
      font-size: 0.78rem; color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .opt-badge {
      font-size: 0.68rem; font-weight: 400; color: var(--muted);
      margin-left: 6px;
    }
    .chevron {
      font-size: 0.7rem; color: var(--muted);
      transition: transform .22s ease; flex-shrink: 0;
    }
    .meal-card.open .chevron { transform: rotate(180deg); }

    .meal-body { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
    .meal-card.open .meal-body { max-height: 900px; }

    .meal-body-inner {
      padding: 0 16px 14px;
      border-top: 1px solid var(--border);
    }
    .person-row {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .person-row:last-child { border-bottom: none; }
    .person-tag {
      width: 68px; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); flex-shrink: 0;
    }
    .person-food { font-size: 0.9rem; font-weight: 500; }
    .person-food.empty { color: var(--muted); font-style: italic; font-weight: 400; }

    .ingredients {
      margin-top: 6px; padding: 8px 10px;
      background: var(--bg); border-radius: 8px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .ingredient-item {
      font-size: 0.78rem; color: var(--muted);
      display: flex; align-items: baseline; gap: 6px;
    }
    .ingredient-item::before { content: "·"; color: var(--accent); font-weight: 700; flex-shrink: 0; }
    .ingredient-amount { font-weight: 600; color: var(--ink); min-width: 52px; }
    .ingredient-note {
      margin-top: 5px; padding-top: 5px;
      border-top: 1px dashed var(--border);
      font-size: 0.73rem; color: var(--muted); font-style: italic;
    }

    .type-breakfast .meal-icon { background: #fef3c7; }
    .type-snack     .meal-icon { background: #dbeafe; }
    .type-lunch     .meal-icon { background: var(--green-light); }
    .type-dinner    .meal-icon { background: #fce7f3; }
    .type-optional  .meal-icon { background: #f3e8ff; }



    @media (max-width: 480px) {
      header { padding: 18px 16px 14px; }
      header h1 { font-size: 1.25rem; }
    }

  /* ── Login overlay ──────────────────────────────────────────────────────── */
  #login-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #login-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px 32px;
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    text-align: center;
  }
  #login-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: var(--ink);
  }
  #login-card > p {
    font-size: 0.9rem;
    color: var(--muted);
  }
  #login-input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    transition: border-color .18s;
    text-align: center;
    letter-spacing: 0.1em;
  }
  #login-input:focus { border-color: var(--accent); }
  #login-input.error { border-color: #c0392b; }
  #login-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .18s;
  }
  #login-btn:hover { opacity: 0.88; }
  #login-error {
    font-size: 0.82rem;
    color: #c0392b;
    min-height: 1.2em;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-7px); }
    40%      { transform: translateX(7px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }
  .shake { animation: shake .35s ease; }

  #logout-btn {
    display: block;
    margin: 32px auto 0;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    opacity: 0.6;
  }
  #logout-btn:hover { opacity: 1; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div id="login-card">
    <h2>🍽 Šeimos Meniu</h2>
    <p>Įveskite slaptažodį</p>
    <input type="password" id="login-input" placeholder="slaptažodis" autocomplete="current-password"/>
    <button id="login-btn">Prisijungti</button>
    <p id="login-error"></p>
  </div>
</div>

<header>
  <h1>🍽 Šeimos Meniu</h1>
  <span id="today-label"></span>
</header>

<div class="week-strip" id="week-strip"></div>

<main>
  <p class="day-heading" id="day-heading"></p>
  <div id="menu-area"></div>
</main>

<button id="logout-btn" onclick="logout()">Atsijungti</button>

<script>
// ── Auth ─────────────────────────────────────────────────────────────────────
const PASSWORD = 'seima';   // <-- change this to your family password
const AUTH_KEY = 'menu_auth_v1';

(function initAuth() {
  if (localStorage.getItem(AUTH_KEY) === 'ok') {
    document.getElementById('login-overlay').style.display = 'none';
    return;
  }
  document.getElementById('login-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryLogin();
  });
  document.getElementById('login-btn').addEventListener('click', tryLogin);
})();

function tryLogin() {
  var input = document.getElementById('login-input');
  if (input.value === PASSWORD) {
    localStorage.setItem(AUTH_KEY, 'ok');
    document.getElementById('login-overlay').style.display = 'none';
  } else {
    input.classList.remove('shake', 'error');
    void input.offsetWidth;
    input.classList.add('shake', 'error');
    document.getElementById('login-error').textContent = 'Neteisingas slaptažodis :(';
    input.value = '';
    input.focus();
  }
}

function logout() {
  localStorage.removeItem(AUTH_KEY);
  location.reload();
}

// ─────────────────────────────────────────────────────────────────────────────
const DAYS_LT   = ['Pr.','An.','Tr.','Kt.','Pt.','St.','Sk.'];
const DAYS_FULL = ['Pirmadienis','Antradienis','Trečiadienis','Ketvirtadienis','Penktadienis','Šeštadienis','Sekmadienis'];

let selected = new Date();

function isoDate(d) { return d.toISOString().slice(0,10); }

function getMonday(d) {
  const day = new Date(d);
  const wd = day.getDay();
  day.setDate(day.getDate() - (wd === 0 ? 6 : wd - 1));
  return day;
}

function dayIdx(d) {
  const wd = d.getDay();
  return wd === 0 ? 6 : wd - 1;
}

// ── Week strip ──────────────────────────────────────────────────────────────
function buildStrip() {
  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';
  const mon = getMonday(selected);
  const today = isoDate(new Date());

  for (let i = 0; i < 7; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    const ds = isoDate(d);

    const btn = document.createElement('button');
    btn.className = 'day-chip';
    if (ds === today) btn.classList.add('is-today');
    if (ds === isoDate(selected)) btn.classList.add('active');

    btn.innerHTML = `<span class="abbr">${DAYS_LT[i]}</span>`;
    btn.addEventListener('click', () => { selected = new Date(d); buildStrip(); renderMenu(); });
    strip.appendChild(btn);
  }
}

// ── Card builder ────────────────────────────────────────────────────────────
function card({ type, icon, label, optional, persons }) {
  const rows = persons.filter(p => p.value != null);
  if (rows.length === 0) return '';
  const hasReal = rows.some(p => p.value && p.value !== '-');
  if (!hasReal && optional) return '';

  const preview = rows.map(p => (p.value && p.value !== '-') ? p.value : '—').join(' · ');

  return `
    <div class="meal-card type-${type}">
      <div class="meal-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="meal-icon">${icon}</div>
        <div class="meal-time">
          <strong>${label}${optional ? '<span class="opt-badge">(neprivaloma)</span>' : ''}</strong>
          <div class="meal-preview">${preview}</div>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="meal-body">
        <div class="meal-body-inner">
          ${rows.map(p => {
            const hasFood = p.value && p.value !== '-';
            const ingr = p.ingredients || [];
            return `
            <div class="person-row" style="flex-direction:column;align-items:flex-start;gap:4px;">
              <div style="display:flex;align-items:center;gap:12px;width:100%">
                <span class="person-tag">${p.name}</span>
                <span class="person-food${hasFood ? '' : ' empty'}">${hasFood ? p.value : '—'}</span>
              </div>
              ${ingr.length ? `<div class="ingredients">
                ${ingr.map(i => `<div class="ingredient-item"><span class="ingredient-amount">${i.amount}</span><span>${i.name}</span></div>`).join('')}
                ${p.note ? `<div class="ingredient-note">${p.note}</div>` : ''}
              </div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
}

// ── Lunchbox card (Emanuel only: snackI + snackII) ───────────────────────────
function lunchboxIngr(val) {
  if (!val) return [];
  if (val.startsWith('P&J')) return INGR.lunchbox_pj.items;
  if (val.startsWith('Berr') || val.startsWith('Veg')) return INGR.lunchbox_berr.items;
  if (val === 'Cheese') return INGR.lunchbox_cheese.items;
  return [];
}

function lunchboxCard({ di, E }) {
  const s1 = E.snackI ? E.snackI[di] : null;
  const s2 = E.snackII ? E.snackII[di] : null;
  if (!s1 && !s2) return '';
  const preview = [s1, s2].filter(Boolean).join(' + ');
  function renderRow(label, val) {
    if (!val) return '';
    const ingr = lunchboxIngr(val);
    return '<div class="person-row" style="flex-direction:column;align-items:flex-start;gap:4px;">'
      + '<div style="display:flex;align-items:center;gap:12px;width:100%">'
      + '<span class="person-tag">' + label + '</span>'
      + '<span class="person-food">' + val + '</span>'
      + '</div>'
      + (ingr.length ? '<div class="ingredients">'
          + ingr.map(function(i){ return '<div class="ingredient-item"><span class="ingredient-amount">' + i.amount + '</span><span>' + i.name + '</span></div>'; }).join('')
          + '</div>' : '')
      + '</div>';
  }
  return '<div class="meal-card type-snack">'
    + '<div class="meal-header" onclick="this.parentElement.classList.toggle(\'open\')">'
    + '<div class="meal-icon">🎒</div>'
    + '<div class="meal-time">'
    + '<strong>Lunchbox <span class="opt-badge">Emanuel</span></strong>'
    + '<div class="meal-preview">' + preview + '</div>'
    + '</div>'
    + '<span class="chevron">▼</span>'
    + '</div>'
    + '<div class="meal-body">'
    + '<div class="meal-body-inner">'
    + renderRow('Snack I', s1)
    + renderRow('Snack II', s2)
    + '</div></div></div>';
}

function dinnerIngr(val, person) {
  if (val === 'Sumuštiniai') {
    if (person === 'julius')  return {i: DINNER_INGR.sumustiniai_julius.items,  n: DINNER_INGR.sumustiniai_julius.note};
    if (person === 'margo')   return {i: DINNER_INGR.sumustiniai_margo.items,   n: DINNER_INGR.sumustiniai_margo.note};
    if (person === 'emanuel') return {i: DINNER_INGR.sumustiniai_emanuel.items, n: null};
    if (person === 'tabita')  return {i: DINNER_INGR.sumustiniai_tabita.items,  n: null};
  }
  if (val === 'Varškė') {
    return person === 'julius' || person === 'emanuel'
      ? {i: VARSKE_INGR.dinner_julius.items, n: null}
      : {i: VARSKE_INGR.dinner_margo.items,  n: null};
  }
  if (val === 'Salotos' || val === 'Slts') return {i: DINNER_INGR.salotos.items, n: null};
  if (val === 'Salotos+FRI') return {i: [...DINNER_INGR.salotos.items, ...DINNER_INGR.salotos_fri.items], n: null};
  if (val === 'Nuggets+Slts') return {i: [...DINNER_INGR.nuggets.items, ...DINNER_INGR.salotos.items], n: null};
  return {i:[], n:null};
}

      }
      return card({ type:'lunch', icon:'🥗', label:'Pietūs', persons});
    })()}

    ${(() => {
      function sp(val, person) { const r = snackIngr(val, person); return {ingredients:r.i, note:r.n}; }
      return card({ type:'snack', icon:'🧀', label:'Snack', persons:[
        {name:'Julius',  value: J.snack[di], ...sp(J.snack[di], 'julius')},
        {name:'Margo',   value: M.snack[di], ...sp(M.snack[di], 'margo')},
        {name:'Emanuel', value: E.snack[di], ...sp(E.snack[di], 'emanuel')},
        {name:'Tabita',  value: T.snack[di], ...sp(T.snack[di], 'tabita')},
      ]});
    })()}

    ${(() => {
      function dp(val, person) { const r = dinnerIngr(val, person); return {ingredients:r.i, note:r.n}; }
      return card({ type:'dinner', icon:'🌙', label:'Vakarienė', persons:[
        {name:'Julius',  value: J.dinner[di], ...dp(J.dinner[di], 'julius')},
        {name:'Margo',   value: M.dinner[di], ...dp(M.dinner[di], 'margo')},
        {name:'Emanuel', value: E.dinner[di], ...dp(E.dinner[di], 'emanuel')},
        {name:'Tabita',  value: T.dinner[di], ...dp(T.dinner[di], 'tabita')},
      ]});
    })()}

    ${(() => {
      function ep(val, person) { if (!val) return {ingredients:[], note:null}; const r = snackIngr(val, person); return {ingredients:r.i, note:r.n}; }
      const jv = J.eveningSnack ? J.eveningSnack[di] : null;
      const ev = E.eveningSnack ? E.eveningSnack[di] : null;
      const tv = T.eveningSnack ? T.eveningSnack[di] : null;
      return card({ type:'optional', icon:'🌛', label:'Snack vakaras', optional:true, persons:[
        {name:'Julius',  value: jv, ...ep(jv, 'julius')},
        {name:'Emanuel', value: ev, ...ep(ev, 'emanuel')},
        {name:'Tabita',  value: tv, ...ep(tv, 'tabita')},
      ]});
    })()}
  `;
}

buildStrip();
renderMenu();
</script>
</body>
